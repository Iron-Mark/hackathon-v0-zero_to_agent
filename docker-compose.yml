services:
  hireproof:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hireproof
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      PORT: 3002
      HOSTNAME: 0.0.0.0
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3002}
      AGENT_API_KEY: ${AGENT_API_KEY:-hireproof_agent_demo_key}
      AI_GATEWAY_API_KEY: ${AI_GATEWAY_API_KEY:-}
      VERCEL_AI_GATEWAY_API_KEY: ${VERCEL_AI_GATEWAY_API_KEY:-}
      HIREPROOF_MODEL: ${HIREPROOF_MODEL:-openai/gpt-4o-mini}
      MODEL_PROVIDER_KEY: ${MODEL_PROVIDER_KEY:-}
      SERPAPI_API_KEY: ${SERPAPI_API_KEY:-}
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL:-}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN:-}
      REDIS_URL: ${REDIS_URL:-}
      WORKFLOW_SECRET: ${WORKFLOW_SECRET:-}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const port=process.env.PORT||3002; fetch('http://127.0.0.1:'+port+'/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    restart: unless-stopped
