  <text x="104" y="812" fill="#167C5C" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="30" font-weight="850">Built for Cursor Hackathon with v0, MCP, AI SDK, SerpApi, and Vercel.</text>
