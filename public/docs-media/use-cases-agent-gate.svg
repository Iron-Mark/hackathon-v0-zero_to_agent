<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">HireProof AI hiring automation gate</title>
  <desc id="desc">A branded HireProof architecture graphic showing job sources, AI apply agents, the HireProof audit gate, and verdict-based routing.</desc>
  <rect width="1440" height="900" rx="44" fill="#06120F"/>
  <path d="M0 0H1440V900H0V0Z" fill="url(#grid)" opacity="0.34"/>
  <circle cx="1175" cy="152" r="260" fill="#21C47B" opacity="0.07"/>
  <circle cx="230" cy="768" r="240" fill="#5B8CFF" opacity="0.06"/>

  <g transform="translate(96 78)">
    <rect x="0" y="0" width="1248" height="744" rx="32" fill="#0A1714" stroke="#1D352E" stroke-width="2"/>
    <rect x="34" y="34" width="1180" height="676" rx="24" fill="#07110F" stroke="#152B25"/>

    <g transform="translate(72 74)">
      <rect x="0" y="0" width="58" height="58" rx="16" fill="#21C47B"/>
      <path d="M17 31.5L25.4 40L42 20" stroke="#06120F" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M21 18H37C40.3 18 43 20.7 43 24V36C43 39.3 40.3 42 37 42H21C17.7 42 15 39.3 15 36V24C15 20.7 17.7 18 21 18Z" stroke="#06120F" stroke-width="3" opacity="0.38"/>
    </g>

    <text x="154" y="103" fill="#F4FBF8" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="800">HireProof as the apply-agent safety gate</text>
    <text x="154" y="139" fill="#A8B8B2" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600">Before automation submits resumes or personal data, route the opportunity through evidence-weighted job scam checks.</text>

    <g transform="translate(74 238)">
      <rect x="0" y="0" width="220" height="156" rx="22" fill="#0E1D19" stroke="#274038" stroke-width="2"/>
      <text x="28" y="50" fill="#F4FBF8" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="800">Job source</text>
      <text x="28" y="86" fill="#A8B8B2" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600">Boards</text>
      <text x="28" y="114" fill="#A8B8B2" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600">Recruiter chats</text>
      <text x="28" y="142" fill="#A8B8B2" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600">Screenshots</text>
    </g>

    <path d="M322 316H430" stroke="#35564C" stroke-width="4" stroke-linecap="round"/>
    <path d="M430 316L410 304V328L430 316Z" fill="#35564C"/>

    <g transform="translate(458 238)">
      <rect x="0" y="0" width="240" height="156" rx="22" fill="#101B25" stroke="#334761" stroke-width="2"/>
      <text x="28" y="50" fill="#F4FBF8" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="800">Apply agent</text>
      <text x="28" y="86" fill="#A8B8B2" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600">Autofill</text>
      <text x="28" y="114" fill="#A8B8B2" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600">Resume send</text>
      <text x="28" y="142" fill="#A8B8B2" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600">Follow-up drafts</text>
    </g>

    <path d="M730 316H838" stroke="#35564C" stroke-width="4" stroke-linecap="round"/>
    <path d="M838 316L818 304V328L838 316Z" fill="#35564C"/>

    <g transform="translate(866 204)">
      <rect x="0" y="0" width="300" height="224" rx="28" fill="#10261F" stroke="#21C47B" stroke-width="3"/>
