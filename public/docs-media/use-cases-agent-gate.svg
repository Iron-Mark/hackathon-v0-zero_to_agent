      <text x="28" y="40" fill="#21C47B" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="900">Safe</text>
      <text x="28" y="69" fill="#A8B8B2" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600">Continue with normal review</text>
    </g>

    <g transform="translate(498 552)">
      <rect x="0" y="0" width="250" height="96" rx="20" fill="#231D0E" stroke="#D6A33A" stroke-width="2"/>
      <text x="28" y="40" fill="#D6A33A" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="900">Caution</text>
      <text x="28" y="69" fill="#BFB5A1" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600">Ask for human review first</text>
    </g>

    <g transform="translate(814 552)">
      <rect x="0" y="0" width="250" height="96" rx="20" fill="#260F12" stroke="#F06464" stroke-width="2"/>
      <text x="28" y="40" fill="#F06464" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="900">High-risk</text>
      <text x="28" y="69" fill="#C9A9AA" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600">Stop submit and preserve receipts</text>
    </g>

    <path d="M1016 519C1016 510 1016 500 1016 492" stroke="#35564C" stroke-width="4" stroke-linecap="round"/>
    <path d="M1016 519C1016 519 856 520 939 552" stroke="#35564C" stroke-width="4" stroke-linecap="round"/>
    <path d="M1016 519C880 520 710 520 623 552" stroke="#35564C" stroke-width="4" stroke-linecap="round"/>
    <path d="M1016 519C748 520 434 520 307 552" stroke="#35564C" stroke-width="4" stroke-linecap="round"/>

    <text x="74" y="700" fill="#A8B8B2" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Integration-ready surfaces: Web UI, API, MCP tools, ChatSDK routes, automation workflows, CLI/TUI, and extension package workflow.</text>
  </g>

  <defs>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" stroke="#1D352E" stroke-width="1"/>
