      <path d="M47 62L58 73L80 47" stroke="#06120F" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="30" y="123" fill="#F4FBF8" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="900">HireProof audit</text>
      <text x="30" y="158" fill="#A8B8B2" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600">Company identity</text>
      <text x="30" y="184" fill="#A8B8B2" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600">Apply path and recruiter claims</text>
      <text x="30" y="210" fill="#A8B8B2" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600">Salary, reputation, evidence</text>
